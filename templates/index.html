{% extends 'base.html' %}

{% block main %}
{% load static %}

<div class="booking-hero-container d-flex align-items-center justify-content-center">
  <div class="container">
    <div class="row align-items-center justify-content-center g-4 g-lg-5">
      
      <!-- Left Side: Interactive Feature Image -->
      <div class="col-12 col-md-5 text-center text-md-end">
        <div class="image-wrapper shadow-lg">
          <img src="{% static 'images/travel1.jpg' %}" alt="Travel Destination" class="img-fluid rounded-4">
          <div class="image-overlay-badge">
            <span>✨ Popular Choice</span>
          </div>
        </div>
      </div>
      
      <!-- Right Side: Clean Booking Card -->
      <div class="col-12 col-md-6 col-lg-5">
        <div class="booking-card p-4 p-sm-5 shadow-lg rounded-4">
          <div class="card-header-content mb-4">
            <h2 class="fw-bold tracking-tight text-dark">Plan Your Trip</h2>
            <p class="text-muted small mb-0">Explore the world with us! Book your dream trip today.</p>
          </div>
          
          <form action="#" method="POST" class="booking-form">
            {% csrf_token %} <!-- Don't forget security tokens in Django POST forms! -->
            <div class="form-floating mb-3">
              <input type="text" class="form-control unique-input" id="destination" name="destination" placeholder="Enter destination" required>
              <label for="destination">Where to?</label>
            </div>
            
            <div class="form-floating mb-4">
              <input type="date" class="form-control unique-input" id="date" name="date" required>
              <label for="date">Travel Date</label>
            </div>
            
            <button type="submit" class="btn btn-action w-100 py-3 fw-semibold shadow-sm">
              Book Now 
              <i class="bi bi-arrow-right ms-2"></i>
            </button>
          </form>
        </div>
      </div>

    </div>
  </div>
</div>

{% endblock main %}
